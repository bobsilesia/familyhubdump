name: CI
on:
  push:
    branches:
      - '**'
  pull_request:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
jobs:
  lint-and-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install quality tools
        run: pip install flake8 ruff black isort autoflake
      - name: Auto fix (in-runner, no commit)
        run: |
          autoflake --remove-all-unused-imports --in-place --recursive .
          ruff check --fix .
          black . --line-length 79
          isort . --line-length 79
      - name: Lint
        run: flake8 custom_components/familyhub
      - name: Syntax check
        run: python -m compileall -q custom_components/familyhub
