name: Auto Branch Fix

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  autofix-branch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: pip install ruff autoflake

      - name: Run auto fixes
        run: |
          autoflake --remove-all-unused-imports --in-place --recursive .
          ruff check --fix .
          ruff format .

      - name: Create PR with changes
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "style: automated formatting (ruff)"
          title: "Automated formatting fixes"
          body: "Apply automated formatting per CI policy."
          branch: "autofix/${{ github.run_id }}"
          base: "main"
          labels: "autofix"
