name: Wiki Sync

on:
  push:
    paths:
      - 'wiki_content/**'
    branches:
      - '**'
  workflow_dispatch:

jobs:
  sync:
    if: ${{ github.event.repository.has_wiki }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sync wiki_content to GitHub Wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p /tmp/wiki
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git" /tmp/wiki || { echo "Wiki repo missing or insufficient permissions; skipping sync."; exit 0; }
          rsync -av --delete --exclude='.git/' wiki_content/ /tmp/wiki/
          cd /tmp/wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(wiki): sync from wiki_content"
            git push
          fi
