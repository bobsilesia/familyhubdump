name: Auto Fix

on:
  pull_request:
    paths-ignore:
      - '.github/workflows/**'
  push:
    branches-ignore:
      - main
    paths-ignore:
      - '.github/workflows/**'

jobs:
  autofix:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: pip install ruff autoflake

      - name: Run ruff fix
        run: |
          autoflake --remove-all-unused-imports --in-place --recursive .
          ruff check --fix .
          ruff format .

      - name: Lint check (non-blocking)
        run: ruff check . || true

      - name: Auto commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "style: auto format (ruff) via CI"
